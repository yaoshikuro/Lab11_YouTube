<!DOCTYPE html>
<html lang="ru-Ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Youtube clone</h1>

            <button class="search-btn">�</button>
        </div>
        <div class="header-right">
            <button>➕</button>
            <button>�</button>
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-LGZtyxy2JkS9Jxu6BlZsyCQPiya4ZkrE2w&s"
                alt="Avatar" class="avatar" height="20" width="20">
        </div>
    </header>
    <div class="content">
        <aside class="sidebar">
            <nav>
                <a href="#" class="sidebar-link active">
                    <span class="icon">🏠</span>
                    <span>Главная</span>
                </a>
                <a href="#" class="sidebar-link">
                    <span class="icon">🔥</span>

                <a href="#" class="sidebar-link">

                </a>
                <a href="#" class="sidebar-link">
                    <span class="icon">🕐</span>
                    <span>История</span>
                </a>
                <a href="#" class="sidebar-link">
                    <span class="icon">👍</span>
                    <span>Понравилось</span>
                </a>
            </nav>
        </aside>
        <main class="main">
            <div class="chips">
                <div class="chip active">Все</div>
                <div class="chip">Музыка</div>
                <div class="chip">Игры</div>
                <div class="chip">Новости</div>
                <div class="chip">Спорт</div>
                <div class="chip">Образование</div>
